{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">  
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">  
    <title>Home Page</title>
</head>
<body>

    <nav class="navbar navbar-extend-lg nav justify-content-end" id="nav-bar">
        <div class="container-fluid">

            <a class="navbar-brand">Restaurant</a>

            <ul class="nav justify-content-end">
                
               
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-item" href="{% url 'home' %}">Order</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-item" href="{% url 'cart' %}">Cart</a>
                    </li>
                    <li class="nav-item">
                        
                        <form method="post" action="{% url 'logout_view' %}">
                            {% csrf_token %}
                            <input type="submit" value="Logout">
                        </form>

                    </li>
            
                {% else %}
            
                    <li class="nav-item">
                        <a class="nav-item" href="{% url 'register' %}">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-item" href="{% url 'signin' %}">Login</a>
                    </li>
            
                {% endif %}
            </ul>
        </div>
    </nav>

    {% block content %}

    {% endblock %}
    
</body>
</html>
